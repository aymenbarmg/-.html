<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد طالب السادس العلمي</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Cairo,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

.subject{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.subject h2{
margin-bottom:10px;
color:#333;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.addLecture{
background:#4caf50;
color:white;
}

.addOnline{
background:#ff9800;
color:white;
}

.addExam{
background:#f44336;
color:white;
}

.generate{
width:100%;
background:#1565c0;
color:white;
font-size:18px;
padding:15px;
}

.event{
background:#eef5ff;
padding:10px;
margin-top:10px;
border-radius:10px;
border-right:5px solid #1565c0;
}

.dayCard{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.dayTitle{
color:#1565c0;
margin-bottom:10px;
}

.study{
color:#4caf50;
font-weight:bold;
}

.exam{
color:red;
font-weight:bold;
}

.online{
color:#ff9800;
font-weight:bold;
}

.lecture{
color:#1565c0;
font-weight:bold;
}

.deleteBtn{
background:#d32f2f;
color:white;
padding:5px 10px;
font-size:12px;
}

</style>
</head>

<body>

<h1>📚 مساعد طالب السادس العلمي</h1>

<div id="subjects"></div>

<button
class="generate"
onclick="generateSchedule()">
إنشاء الجدول الذكي
</button>

<div id="result"></div>

<script>

const subjects = [
"العربي",
"الإنكليزي",
"الرياضيات",
"الفيزياء",
"الكيمياء",
"الأحياء",
"الإسلامية"
];

const subjectsContainer =
document.getElementById("subjects");

subjects.forEach((name,index)=>{

subjectsContainer.innerHTML += `

<div class="subject">

<h2>${name}</h2>

<label>

<input
type="checkbox"
id="registered${index}">

مسجل في معهد

</label>

<input
id="institute${index}"
placeholder="اسم المعهد">

<div id="events${index}"></div>

<button
class="addLecture"
onclick="addLecture(${index})">

➕ إضافة محاضرة

</button>

<button
class="addOnline"
onclick="addOnlineExam(${index})">

💻 إضافة امتحان إلكتروني

</button>

<button
class="addExam"
onclick="addPhysicalExam(${index})">

📝 إضافة امتحان حضوري

</button>

</div>

`;

});
function createEventHTML(type){

return `

<div class="event">

<b>${type}</b>

<select class="day">

<option>السبت</option>
<option>الأحد</option>
<option>الإثنين</option>
<option>الثلاثاء</option>
<option>الأربعاء</option>
<option>الخميس</option>
<option>الجمعة</option>

</select>

<input
type="time"
class="startTime">

<input
type="time"
class="endTime">

<button
class="deleteBtn"
onclick="this.parentElement.remove()">

حذف

</button>

</div>

`;

}

function addLecture(index){

document
.getElementById(`events${index}`)
.insertAdjacentHTML(
'beforeend',
createEventHTML("🎓 محاضرة")
);

}

function addOnlineExam(index){

document
.getElementById(`events${index}`)
.insertAdjacentHTML(
'beforeend',
createEventHTML("💻 امتحان إلكتروني")
);

}

function addPhysicalExam(index){

document
.getElementById(`events${index}`)
.insertAdjacentHTML(
'beforeend',
createEventHTML("📝 امتحان حضوري")
);

}

function generateSchedule(){

const days = [
"السبت",
"الأحد",
"الإثنين",
"الثلاثاء",
"الأربعاء",
"الخميس",
"الجمعة"
];

let week = {};

days.forEach(day=>{

week[day] = [];

});

subjects.forEach((subject,index)=>{

const events = document.querySelectorAll(
`#events${index} .event`
);

events.forEach(event=>{

const type =
event.querySelector("b").innerText;

const day =
event.querySelector(".day").value;

const start =
event.querySelector(".startTime").value;

const end =
event.querySelector(".endTime").value;

week[day].push({
subject,
type,
start,
end
});

});

});

let html = "";

days.forEach(day=>{

html += `
<div class="dayCard">

<h2 class="dayTitle">
${day}
</h2>

<ul>
`;

week[day]
.sort((a,b)=>
a.start.localeCompare(b.start)
);

if(
week[day].length===0
){

html += `
<li>
📖 مراجعة عامة
</li>
`;

}

week[day].forEach(item=>{

let className = "";

if(
item.type.includes("محاضرة")
){

className="lecture";

html += `
<li class="${className}">
${item.start}
-
${item.end}

${item.type}

${item.subject}
</li>

<li class="study">
📚 مراجعة
${item.subject}
قبل المحاضرة بساعة
</li>
`;

}

if(
item.type.includes("إلكتروني")
){

className="online";

html += `
<li class="${className}">
${item.start}
-
${item.end}

${item.type}

${item.subject}
</li>

<li class="study">
📖 مراجعة
${item.subject}
قبل الامتحان الإلكتروني بساعة
</li>
`;

}

if(
item.type.includes("حضوري")
){

className="exam";

html += `
<li class="${className}">
${item.start}
-
${item.end}

${item.type}

${item.subject}
</li>

<li class="study">
🔥 مراجعة مكثفة
${item.subject}
قبل الامتحان الحضوري بساعتين
</li>
`;

}

});

html += `
</ul>

</div>
`;

});

document
.getElementById("result")
.innerHTML = html;

}

</script>

</body>
</html>
